<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Layout Check</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f1f5f9; }
    .dashboard-shell {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 1.5rem;
      align-items: stretch;
    }
    .dashboard-shell > .col-lg-3,
    .dashboard-shell > .admin-sidebar-column {
      flex: 0 0 280px !important;
      width: 280px !important;
    }
    .dashboard-shell > .col-lg-9,
    .dashboard-shell > .dashboard-main-column {
      flex: 1 1 0 !important;
      min-width: 0 !important;
    }
    .admin-sidebar,
    .content-panel {
      border-radius: 24px;
      padding: 24px;
      background: #fff;
      border: 1px solid #dbe3ef;
      box-shadow: 0 18px 40px rgba(15,23,42,0.08);
    }
    .content-panel { min-height: 400px; }
    @media (max-width: 991.98px) {
      .dashboard-shell { display: block !important; }
      .dashboard-shell > .col-lg-3,
      .dashboard-shell > .col-lg-9,
      .dashboard-shell > .admin-sidebar-column,
      .dashboard-shell > .dashboard-main-column { width: 100% !important; flex: none !important; }
    }
  </style>
</head>
<body>
  <div class="dashboard-shell" style="display:flex; flex-wrap:wrap; gap:1.5rem; align-items:stretch;">
    <div class="col-lg-3" style="flex:0 0 280px; width:280px;">
      <aside class="admin-sidebar">Sidebar</aside>
    </div>
    <div class="col-lg-9" style="flex:1 1 0; min-width:0;">
      <div class="content-panel">Main Content</div>
    </div>
  </div>
</body>
</html>
